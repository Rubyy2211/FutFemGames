{% load static %}
{% load i18n %}
{% load compress %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Completa tu cartón de bingo con las jugadoras correctas según sus equipos y gana el juego">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Futfem Bingo</title>
    <link rel="icon" href="{% static 'img/logo.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Montserrat:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Montserrat:wght@400;700&display=swap" media="print" onload="this.media='all'">

    <!--<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" media="print" onload="this.media='all'">-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css" media="print" onload="this.media='all'">

    <link rel="preload" href="/api/juegoxid?id_juego=6" as="fetch" crossorigin="anonymous">
    <link rel="modulepreload" href="/static/js/games/bingo.js">
    <link rel="modulepreload" href="/static/js/games/funciones-comunes.js">
    <link rel="modulepreload" href="/static/futfem/js/jugadora.js">

    {% compress css inline %}
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'css/bingo.css' %}">
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
    {% endcompress %}
    <noscript>
        <!--<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">-->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css">
    </noscript>
</head>
<body {% if usuario_sesion.equipo_favorito.id_equipo %}data-team="{{ usuario_sesion.equipo_favorito.id_equipo }}"{% endif %}>
    {% include 'partials/header.html' %}
    <h1>{% trans "Futfem Bingo" %}</h1>
<div class="contenedor">
    <div id="cabecera-bingo">
    <!-- Imagen y nombre del jugador -->
    <div class="player">
        <img id="player-image" src="{% static '/img/predeterm.webp' %}" alt="Jugador" fetchpriority="high">
        <div id="player-name" class="player-name">Jugadora</div>
        <!-- Botón de Skip -->
    </div>
    <button class="skip-button">{% trans "SKIP" %}</button>
    </div>
    <div id="reloj">Tiempo</div>
    <div id="resultado"></div>
    <table id="grid">
    <tbody>
        <tr>
            <td id="c11"></td>
            <td id="c12"></td>
            <td id="c13"></td>
            <td id="c14"></td>
        </tr>
        <tr>
            <td id="c21"></td>
            <td data-answer="jugadora1" id="c22"></td>
            <td data-answer="jugadora2" id="c23"></td>
            <td data-answer="jugadora3" id="c24"></td>
        </tr>
        <tr>
            <td id="c31"></td>
            <td data-answer="jugadora4" id="c32"></td>
            <td data-answer="jugadora5" id="c33"></td>
            <td data-answer="jugadora6" id="c34"></td>
        </tr>
        </tbody>
    </table>
</div>
<script src="{% url 'javascript-catalog' %}" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js" defer></script>
<script src="{% static 'js/admin.js' %}" defer></script>
<script src="{% static 'js/animations/header.js' %}" defer></script>
<script src="{% static 'js/animations/bingo.js' %}" defer></script>
<script type="module" src="{% static 'js/games/bingo.js' %}" defer></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>
</body>
</html>
