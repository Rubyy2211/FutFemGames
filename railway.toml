[deploy]
startCommand = "python manage.py migrate && gunicorn FutFemGames.wsgi:application --bind 0.0.0.0:${PORT:-8000}"

[build.nixpacks]
# Instalamos las librerías de sistema necesarias para Cairo y MySQL
aptPkgs = [
    "libcairo2-dev",
    "pkg-config",
    "python3-dev",
    "libexttextcat-dev",
    "libgirepository1.0-dev",
    "default-libmysqlclient-dev"
]